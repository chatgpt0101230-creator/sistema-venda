<!-- ========================================= -->
<!-- ORGANIZADOR PROFISSIONAL PREMIUM -->
<!-- ========================================= -->

<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Organizador Profissional</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0f172a;
    color:white;
}

/* HEADER */

header{

    background:#111827;

    padding:15px 20px;

    display:flex;

    align-items:center;

    gap:15px;

    font-size:22px;

    font-weight:bold;

    position:sticky;

    top:0;

    z-index:999;
}

/* MENU */

.menu-toggle{

    background:#2563eb;

    border:none;

    color:white;

    padding:10px 15px;

    border-radius:10px;

    font-size:22px;

    cursor:pointer;
}

.container{

    display:flex;

    min-height:100vh;
}

.sidebar{

    width:260px;

    background:#111827;

    padding:20px;

    transition:0.3s;
}

.sidebar.hide{

    margin-left:-260px;
}

.sidebar h2{

    margin-bottom:20px;
}

.sidebar button{

    width:100%;

    border:none;

    padding:14px;

    margin-bottom:12px;

    border-radius:10px;

    background:#1e293b;

    color:white;

    cursor:pointer;

    transition:0.3s;
}

.sidebar button:hover{

    background:#2563eb;

    transform:scale(1.02);
}

/* CONTEÚDO */

.content{

    flex:1;

    padding:20px;
}

.tab{

    display:none;
}

.tab.active{

    display:block;
}

/* DASHBOARD */

.dashboard{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

    gap:15px;

    margin-bottom:20px;
}

.box{

    padding:25px;

    border-radius:18px;

    color:white;

    box-shadow:0 5px 15px rgba(0,0,0,0.2);

    animation:fade 0.4s;
}

.box h2{

    font-size:28px;

    margin-bottom:8px;
}

@keyframes fade{

    from{

        opacity:0;

        transform:translateY(10px);
    }

    to{

        opacity:1;

        transform:translateY(0);
    }
}

/* CARDS */

.card{

    background:#1e293b;

    padding:20px;

    border-radius:18px;

    margin-bottom:20px;

    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.card h2{

    margin-bottom:15px;
}

/* INPUTS */

input,
select,
textarea{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    margin-top:10px;

    background:#334155;

    color:white;
}

textarea{

    min-height:100px;
}

input::placeholder,
textarea::placeholder{

    color:#cbd5e1;
}

/* BOTÕES */

.btn{

    width:100%;

    margin-top:15px;

    padding:14px;

    border:none;

    border-radius:12px;

    background:#2563eb;

    color:white;

    cursor:pointer;

    font-size:16px;

    transition:0.3s;
}

.btn:hover{

    transform:scale(1.02);

    background:#1d4ed8;
}

/* ITENS */

.item{

    background:#1e293b;

    padding:18px;

    border-radius:18px;

    margin-bottom:15px;

    animation:fade 0.3s;
}

.item h3{

    margin-bottom:10px;
}

.item p{

    margin-top:5px;
}

/* STATUS */

.status{

    display:inline-block;

    margin-top:12px;

    padding:6px 14px;

    border-radius:30px;

    font-size:14px;
}

.pendente{

    background:#dc2626;
}

.andamento{

    background:#f59e0b;
}

.pronto{

    background:#16a34a;
}

/* AÇÕES */

.actions{

    margin-top:15px;

    display:flex;

    flex-wrap:wrap;

    gap:10px;
}

.actions button{

    border:none;

    padding:10px 14px;

    border-radius:10px;

    cursor:pointer;

    color:white;
}

.edit{

    background:#2563eb;
}

.delete{

    background:#dc2626;
}

.done{

    background:#16a34a;
}

/* MOBILE */

@media(max-width:768px){

    .sidebar{

        position:fixed;

        top:0;

        left:0;

        height:100vh;

        z-index:1000;
    }

    .content{

        padding:15px;
    }
}

</style>

</head>

<body>

<header>

<button class="menu-toggle"
onclick="toggleMenu()">

☰

</button>

📋 Organizador Premium

</header>

<div class="container">

<!-- MENU -->

<div class="sidebar hide">

<h2>Menu</h2>

<button onclick="showTab('dashboard')">
📊 Dashboard
</button>

<button onclick="showTab('cadastro')">
📝 Cadastro Serviço
</button>

<button onclick="showTab('historico')">
📦 Histórico
</button>

<button onclick="showTab('organizacao')">
📅 Organização
</button>

<hr style="margin:20px 0; border-color:#334155;">

<button onclick="backupData()">
💾 Backup Local
</button>

<input type="file"
id="restoreFile"
hidden>

<button onclick="document.getElementById('restoreFile').click()">
♻ Restaurar Backup
</button>

</div>

<!-- CONTEÚDO -->

<div class="content">

<!-- DASHBOARD -->

<div class="tab active" id="dashboard">

<div class="dashboard">

<div class="box" style="background:#2563eb;">

<h2 id="totalServicos">0</h2>

<p>Total Serviços</p>

</div>

<div class="box" style="background:#dc2626;">

<h2 id="valorPendentes">R$ 0</h2>

<p>Valores Pendentes</p>

</div>

<div class="box" style="background:#16a34a;">

<h2 id="valorProntos">R$ 0</h2>

<p>Valores Concluídos</p>

</div>

<div class="box" style="background:#7c3aed;">

<h2 id="totalConcluidos">0</h2>

<p>Serviços Prontos</p>

</div>

</div>

</div>

<!-- CADASTRO -->

<div class="tab" id="cadastro">

<div class="card">

<h2>Cadastrar Serviço</h2>

<select id="clienteSelect">

<option value="">
Selecionar Cliente
</option>

</select>

<input type="text"
id="novoCliente"
placeholder="Novo Cliente">

<input type="text"
id="telefoneCliente"
placeholder="Telefone">

<input type="text"
id="servico"
placeholder="Serviço">

<input type="number"
id="valor"
placeholder="Valor">

<input type="date"
id="entrega">

<textarea
id="observacao"
placeholder="Observação"></textarea>

<select id="status">

<option value="Pendente">
Pendente
</option>

<option value="Em andamento">
Em andamento
</option>

<option value="Pronto">
Pronto
</option>

</select>

<button class="btn"
onclick="addServico()">

Cadastrar Serviço

</button>

</div>

</div>

<!-- HISTÓRICO -->

<div class="tab" id="historico">

<div id="listaServicos"></div>

</div>

<!-- ORGANIZAÇÃO -->

<div class="tab" id="organizacao">

<div class="dashboard">

<div class="box" style="background:#2563eb;">

<h2 id="totalCompromissos">0</h2>

<p>Total Compromissos</p>

</div>

<div class="box" style="background:#16a34a;">

<h2 id="totalFeitos">0</h2>

<p>Concluídos</p>

</div>

<div class="box" style="background:#dc2626;">

<h2 id="totalPendentes">0</h2>

<p>Pendentes</p>

</div>

</div>

<div class="card">

<h2>Nova Tarefa</h2>

<input type="text"
id="tarefa"
placeholder="Compromisso">

<input type="time"
id="hora">

<input type="date"
id="dataTarefa">

<button class="btn"
onclick="addTarefa()">

Adicionar Compromisso

</button>

</div>

<div id="listaTarefas"></div>

</div>

</div>

</div>

<!-- SCRIPT -->

<script>

let servicos =
JSON.parse(localStorage.getItem('servicos')) || [];

let tarefas =
JSON.parse(localStorage.getItem('tarefas')) || [];

let clientes =
JSON.parse(localStorage.getItem('clientes')) || [];

/* MENU */

function toggleMenu(){

    document
    .querySelector('.sidebar')
    .classList
    .toggle('hide');
}

/* ABAS */

function showTab(id){

    document.querySelectorAll('.tab')
    .forEach(tab=>{

        tab.classList.remove('active');
    });

    document
    .getElementById(id)
    .classList
    .add('active');

    if(window.innerWidth <= 768){

        document
        .querySelector('.sidebar')
        .classList
        .add('hide');
    }
}

/* SALVAR */

function saveData(){

    localStorage.setItem(
        'servicos',
        JSON.stringify(servicos)
    );

    localStorage.setItem(
        'tarefas',
        JSON.stringify(tarefas)
    );

    localStorage.setItem(
        'clientes',
        JSON.stringify(clientes)
    );

    updateDashboard();

    updateTarefaDashboard();

    sincronizarNuvem();
}

/* CLIENTES */

function renderClientes(){

    const select =
    document.getElementById('clienteSelect');

    select.innerHTML = `
    <option value="">
    Selecionar Cliente
    </option>
    `;

    clientes.forEach(c=>{

        select.innerHTML += `
        <option value="${c.nome}">
        ${c.nome}
        </option>
        `;
    });
}

/* CADASTRO */

function addServico(){

    const clienteSelect =
    document.getElementById('clienteSelect').value;

    const novoCliente =
    document.getElementById('novoCliente').value;

    const telefone =
    document.getElementById('telefoneCliente').value;

    const cliente =
    clienteSelect || novoCliente;

    const servico =
    document.getElementById('servico').value;

    const valor =
    document.getElementById('valor').value;

    const entrega =
    document.getElementById('entrega').value;

    const observacao =
    document.getElementById('observacao').value;

    const status =
    document.getElementById('status').value;

    if(!cliente || !servico){

        alert('Preencha os campos');

        return;
    }

    const existe =
    clientes.find(c=>c.nome===cliente);

    if(!existe){

        clientes.push({

            nome:cliente,
            telefone:telefone

        });
    }

    servicos.push({

        id:Date.now(),

        cliente,
        telefone,
        servico,
        valor,
        entrega,
        observacao,
        status

    });

    saveData();

    renderClientes();

    renderServicos();

    document.getElementById('clienteSelect').value='';
    document.getElementById('novoCliente').value='';
    document.getElementById('telefoneCliente').value='';
    document.getElementById('servico').value='';
    document.getElementById('valor').value='';
    document.getElementById('entrega').value='';
    document.getElementById('observacao').value='';
}

/* RENDER SERVIÇOS */

function renderServicos(){

    const lista =
    document.getElementById('listaServicos');

    lista.innerHTML='';

    servicos.sort((a,b)=>{

        if(a.status === 'Pronto') return 1;

        if(b.status === 'Pronto') return -1;

        return 0;
    });

    servicos.forEach(s=>{

        let classe='pendente';

        if(s.status==='Em andamento'){
            classe='andamento';
        }

        if(s.status==='Pronto'){
            classe='pronto';
        }

        lista.innerHTML += `

        <div class="item">

        <h3>${s.cliente}</h3>

        <p><strong>Serviço:</strong>
        ${s.servico}</p>

        <p><strong>Valor:</strong>
        R$ ${s.valor}</p>

        <p><strong>Entrega:</strong>
        ${s.entrega}</p>

        <p><strong>Observação:</strong>
        ${s.observacao || '-'}</p>

        <span class="status ${classe}">
        ${s.status}
        </span>

        <div class="actions">

        <button class="edit"
        onclick="editarServico(${s.id})">

        Editar

        </button>

        <button class="done"
        onclick="alterarStatus(${s.id})">

        Status

        </button>

        <button class="delete"
        onclick="removerServico(${s.id})">

        Excluir

        </button>

        </div>

        </div>
        `;
    });
}

/* EDITAR */

function editarServico(id){

    const s =
    servicos.find(x=>x.id===id);

    const novo =
    prompt(
    'Editar serviço:',
    s.servico
    );

    if(novo){

        s.servico = novo;

        saveData();

        renderServicos();
    }
}

/* STATUS */

function alterarStatus(id){

    const novo =
    prompt(
`1=Pendente
2=Em andamento
3=Pronto`
    );

    const s =
    servicos.find(x=>x.id===id);

    if(novo==1) s.status='Pendente';

    if(novo==2) s.status='Em andamento';

    if(novo==3) s.status='Pronto';

    saveData();

    renderServicos();
}

/* EXCLUIR */

function removerServico(id){

    if(confirm('Excluir serviço?')){

        servicos =
        servicos.filter(
        s=>s.id!==id
        );

        saveData();

        renderServicos();
    }
}

/* TAREFAS */

function addTarefa(){

    const tarefa =
    document.getElementById('tarefa').value;

    const hora =
    document.getElementById('hora').value;

    const data =
    document.getElementById('dataTarefa').value;

    tarefas.push({

        id:Date.now(),

        tarefa,
        hora,
        data,

        feito:false

    });

    saveData();

    renderTarefas();

    document.getElementById('tarefa').value='';
    document.getElementById('hora').value='';
    document.getElementById('dataTarefa').value='';
}

function renderTarefas(){

    const lista =
    document.getElementById('listaTarefas');

    lista.innerHTML='';

    tarefas.forEach(t=>{

        lista.innerHTML += `

        <div class="item">

        <h3>${t.tarefa}</h3>

        <p>${t.hora} | ${t.data}</p>

        <p>
        ${t.feito ? '✅ Feito' : '❌ Pendente'}
        </p>

        <div class="actions">

        <button class="done"
        onclick="toggleTarefa(${t.id})">

        Marcar

        </button>

        <button class="delete"
        onclick="removerTarefa(${t.id})">

        Excluir

        </button>

        </div>

        </div>
        `;
    });

    updateTarefaDashboard();
}

function toggleTarefa(id){

    const t =
    tarefas.find(x=>x.id===id);

    t.feito = !t.feito;

    saveData();

    renderTarefas();
}

function removerTarefa(id){

    tarefas =
    tarefas.filter(t=>t.id!==id);

    saveData();

    renderTarefas();
}

/* DASHBOARD */

function updateDashboard(){

    document.getElementById(
        'totalServicos'
    ).innerText = servicos.length;

    const prontos =
    servicos.filter(
    s=>s.status==='Pronto'
    );

    const pendentes =
    servicos.filter(
    s=>s.status!=='Pronto'
    );

    let valorPronto = 0;

    let valorPendente = 0;

    prontos.forEach(s=>{

        valorPronto +=
        Number(s.valor || 0);
    });

    pendentes.forEach(s=>{

        valorPendente +=
        Number(s.valor || 0);
    });

    document.getElementById(
        'valorProntos'
    ).innerText =
    'R$ ' + valorPronto.toFixed(2);

    document.getElementById(
        'valorPendentes'
    ).innerText =
    'R$ ' + valorPendente.toFixed(2);

    document.getElementById(
        'totalConcluidos'
    ).innerText =
    prontos.length;
}

function updateTarefaDashboard(){

    document.getElementById(
        'totalCompromissos'
    ).innerText =
    tarefas.length;

    const feitos =
    tarefas.filter(t=>t.feito).length;

    document.getElementById(
        'totalFeitos'
    ).innerText =
    feitos;

    document.getElementById(
        'totalPendentes'
    ).innerText =
    tarefas.length - feitos;
}

/* BACKUP */

function backupData(){

    const dados = {

        servicos,
        tarefas,
        clientes

    };

    const blob =
    new Blob(

        [JSON.stringify(dados)],

        {type:'application/json'}

    );

    const a =
    document.createElement('a');

    a.href =
    URL.createObjectURL(blob);

    a.download =
    'backup-organizador.json';

    a.click();
}

/* RESTAURAR */

document.getElementById('restoreFile')
.addEventListener('change', function(e){

    const file = e.target.files[0];

    const reader =
    new FileReader();

    reader.onload = function(event){

        const dados =
        JSON.parse(event.target.result);

        servicos =
        dados.servicos || [];

        tarefas =
        dados.tarefas || [];

        clientes =
        dados.clientes || [];

        saveData();

        renderClientes();

        renderServicos();

        renderTarefas();

        alert('Backup restaurado!');
    };

    reader.readAsText(file);
});

renderClientes();

renderServicos();

renderTarefas();

updateDashboard();

</script>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
doc,
setDoc,
onSnapshot

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyBzpZz666Vsuuxx_FvBTIITCxyHJwRx4K0",

authDomain:
"organizador-web-58a32.firebaseapp.com",

projectId:
"organizador-web-58a32",

storageBucket:
"organizador-web-58a32.firebasestorage.app",

messagingSenderId:
"868666016791",

appId:
"1:868666016791:web:ad99b7ca5f55fac9dd4852"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const backupRef =
doc(db, "backup", "dados");

/* SALVAR */

window.sincronizarNuvem =
async function(){

    try{

        await setDoc(backupRef, {

            servicos,
            tarefas,
            clientes,

            atualizado:
            new Date().toISOString()

        });

        console.log("Sincronizado");

    }catch(e){

        console.log(e);
    }
}

/* TEMPO REAL */

onSnapshot(backupRef, (docSnap)=>{

    if(docSnap.exists()){

        const dados =
        docSnap.data();

        servicos =
        dados.servicos || [];

        tarefas =
        dados.tarefas || [];

        clientes =
        dados.clientes || [];

        localStorage.setItem(
            'servicos',
            JSON.stringify(servicos)
        );

        localStorage.setItem(
            'tarefas',
            JSON.stringify(tarefas)
        );

        localStorage.setItem(
            'clientes',
            JSON.stringify(clientes)
        );

        renderClientes();

        renderServicos();

        renderTarefas();

        updateDashboard();

        console.log(
        "Atualizado em tempo real"
        );
    }
});

</script>

</body>
</html>
