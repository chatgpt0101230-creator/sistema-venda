<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Organizador Profissional PRO</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- ICONES -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<!-- CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
    --bg:#f4f7fb;
    --card:#ffffff;
    --text:#111827;
    --primary:#4f46e5;
    --secondary:#7c3aed;
    --green:#16a34a;
    --red:#dc2626;
    --orange:#ea580c;
    --shadow:0 10px 30px rgba(0,0,0,0.08);
}

.dark{
    --bg:#0f172a;
    --card:#1e293b;
    --text:#f8fafc;
    --shadow:0 10px 30px rgba(0,0,0,0.4);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    transition:.3s;
}

header{
    background:linear-gradient(90deg,var(--primary),var(--secondary));
    color:white;
    padding:18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky;
    top:0;
    z-index:1000;
    box-shadow:var(--shadow);
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
    font-size:22px;
    font-weight:700;
}

.top-actions{
    display:flex;
    gap:10px;
}

.icon-btn{
    border:none;
    background:rgba(255,255,255,0.15);
    color:white;
    padding:12px;
    border-radius:12px;
    cursor:pointer;
    transition:.3s;
}

.icon-btn:hover{
    transform:scale(1.05);
    background:rgba(255,255,255,0.25);
}

.container{
    display:flex;
}

.sidebar{
    width:260px;
    background:#111827;
    min-height:100vh;
    padding:20px;
    transition:.3s;
}

.sidebar.hide{
    margin-left:-260px;
}

.sidebar h2{
    color:white;
    margin-bottom:20px;
}

.sidebar button{
    width:100%;
    border:none;
    padding:14px;
    border-radius:12px;
    margin-bottom:12px;
    background:#1f2937;
    color:white;
    cursor:pointer;
    transition:.3s;
    text-align:left;
    font-size:15px;
}

.sidebar button:hover{
    background:var(--primary);
    transform:translateX(5px);
}

.content{
    flex:1;
    padding:25px;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.card-dashboard{
    background:var(--card);
    padding:25px;
    border-radius:20px;
    box-shadow:var(--shadow);
    transition:.3s;
}

.card-dashboard:hover{
    transform:translateY(-5px);
}

.card-dashboard h3{
    font-size:14px;
    margin-bottom:10px;
    opacity:.7;
}

.card-dashboard h1{
    font-size:30px;
}

.card{
    background:var(--card);
    border-radius:20px;
    padding:25px;
    box-shadow:var(--shadow);
    margin-bottom:25px;
    animation:fade .4s;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

input,
select,
textarea{
    width:100%;
    padding:14px;
    border-radius:14px;
    border:1px solid #d1d5db;
    margin-top:12px;
    background:transparent;
    color:var(--text);
}

textarea{
    min-height:90px;
}

.btn{
    border:none;
    padding:14px;
    border-radius:14px;
    cursor:pointer;
    margin-top:15px;
    font-weight:600;
    transition:.3s;
}

.btn-primary{
    background:linear-gradient(90deg,var(--primary),var(--secondary));
    color:white;
    width:100%;
}

.btn-primary:hover{
    transform:scale(1.02);
}

.tab{
    display:none;
}

.tab.active{
    display:block;
}

.service{
    background:var(--card);
    border-radius:18px;
    padding:20px;
    box-shadow:var(--shadow);
    margin-bottom:15px;
    border-left:8px solid var(--primary);
}

.status{
    padding:8px 14px;
    border-radius:30px;
    color:white;
    font-size:13px;
    display:inline-block;
    margin-top:10px;
}

.pendente{
    background:var(--red);
}

.andamento{
    background:var(--orange);
}

.pronto{
    background:var(--green);
}

.actions{
    display:flex;
    gap:10px;
    margin-top:15px;
    flex-wrap:wrap;
}

.actions button{
    border:none;
    padding:10px 14px;
    border-radius:12px;
    color:white;
    cursor:pointer;
}

.edit{
    background:var(--primary);
}

.delete{
    background:var(--red);
}

.done{
    background:var(--green);
}

.search{
    margin-bottom:20px;
}

.chart-box{
    background:var(--card);
    padding:20px;
    border-radius:20px;
    box-shadow:var(--shadow);
    margin-bottom:25px;
}

@media(max-width:768px){

    .sidebar{
        position:fixed;
        z-index:999;
        height:100vh;
    }

    .content{
        width:100%;
        padding:15px;
    }

    .dashboard{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<header>

<div class="logo">
<i class="fa-solid fa-layer-group"></i>
Organizador PRO
</div>

<div class="top-actions">

<button class="icon-btn" onclick="toggleDark()">
<i class="fa-solid fa-moon"></i>
</button>

<button class="icon-btn" onclick="toggleMenu()">
<i class="fa-solid fa-bars"></i>
</button>

</div>

</header>

<div class="container">

<div class="sidebar hide">

<h2>MENU</h2>

<button onclick="showTab('dashboard')">
<i class="fa-solid fa-chart-line"></i>
 Dashboard
</button>

<button onclick="showTab('cadastro')">
<i class="fa-solid fa-plus"></i>
 Cadastro Serviço
</button>

<button onclick="showTab('historico')">
<i class="fa-solid fa-box"></i>
 Histórico
</button>

<button onclick="showTab('organizacao')">
<i class="fa-solid fa-calendar"></i>
 Organização
</button>

<hr style="margin:20px 0;opacity:.2;">

<button onclick="backupData()">
<i class="fa-solid fa-download"></i>
 Backup Local
</button>

<button onclick="salvarNuvem()">
<i class="fa-solid fa-cloud-arrow-up"></i>
 Backup Nuvem
</button>

<button onclick="restaurarNuvem()">
<i class="fa-solid fa-cloud-arrow-down"></i>
 Restaurar Nuvem
</button>

<input type="file" id="restoreFile" hidden>

<button onclick="document.getElementById('restoreFile').click()">
<i class="fa-solid fa-rotate-left"></i>
 Restaurar Backup
</button>

</div>

<div class="content">

<!-- DASHBOARD -->

<div class="tab active" id="dashboard">

<div class="dashboard">

<div class="card-dashboard">
<h3>Total Serviços</h3>
<h1 id="totalServicos">0</h1>
</div>

<div class="card-dashboard">
<h3>Total Pendente</h3>
<h1 id="valorPendente">R$ 0</h1>
</div>

<div class="card-dashboard">
<h3>Total Concluído</h3>
<h1 id="valorConcluido">R$ 0</h1>
</div>

<div class="card-dashboard">
<h3>Serviços Prontos</h3>
<h1 id="totalConcluidos">0</h1>
</div>

</div>

<div class="chart-box">
<canvas id="grafico"></canvas>
</div>

</div>

<!-- CADASTRO -->

<div class="tab" id="cadastro">

<div class="card">

<h2>Cadastrar Serviço</h2>

<select id="clienteSelect">
<option value="">Selecionar Cliente</option>
</select>

<input type="text" id="novoCliente" placeholder="Novo Cliente">

<input type="text" id="telefoneCliente" placeholder="Telefone">

<input type="text" id="servico" placeholder="Serviço">

<input type="number" id="valor" placeholder="Valor">

<input type="date" id="entrega">

<textarea id="observacao" placeholder="Observação"></textarea>

<select id="status">
<option>Pendente</option>
<option>Em andamento</option>
<option>Pronto</option>
</select>

<button class="btn btn-primary" onclick="addServico()">
Cadastrar Serviço
</button>

</div>

</div>

<!-- HISTORICO -->

<div class="tab" id="historico">

<div class="card">

<input type="text" class="search" id="pesquisa" placeholder="Pesquisar..." onkeyup="renderServicos()">

<select id="filtroStatus" onchange="renderServicos()">

<option value="">Todos</option>
<option value="Pendente">Pendente</option>
<option value="Em andamento">Em andamento</option>
<option value="Pronto">Pronto</option>

</select>

</div>

<div id="listaServicos"></div>

</div>

<!-- ORGANIZAÇÃO -->

<div class="tab" id="organizacao">

<div class="dashboard">

<div class="card-dashboard">
<h3>Total Compromissos</h3>
<h1 id="totalCompromissos">0</h1>
</div>

<div class="card-dashboard">
<h3>Concluídos</h3>
<h1 id="totalFeitos">0</h1>
</div>

<div class="card-dashboard">
<h3>Pendentes</h3>
<h1 id="totalPendentes">0</h1>
</div>

</div>

<div class="card">

<h2>Novo Compromisso</h2>

<input type="text" id="tarefa" placeholder="Compromisso">

<input type="time" id="hora">

<input type="date" id="dataTarefa">

<button class="btn btn-primary" onclick="addTarefa()">
Adicionar
</button>

</div>

<div id="listaTarefas"></div>

</div>

</div>

</div>

<script>

let servicos = JSON.parse(localStorage.getItem('servicos')) || [];
let tarefas = JSON.parse(localStorage.getItem('tarefas')) || [];
let clientes = JSON.parse(localStorage.getItem('clientes')) || [];

function toggleMenu(){
    document.querySelector('.sidebar').classList.toggle('hide');
}

function toggleDark(){
    document.body.classList.toggle('dark');
}

function showTab(id){

    document.querySelectorAll('.tab').forEach(tab=>{
        tab.classList.remove('active');
    });

    document.getElementById(id).classList.add('active');
}

function saveLocal(){

    localStorage.setItem('servicos',JSON.stringify(servicos));
    localStorage.setItem('tarefas',JSON.stringify(tarefas));
    localStorage.setItem('clientes',JSON.stringify(clientes));

    atualizarDashboard();
}

function renderClientes(){

    const select = document.getElementById('clienteSelect');

    select.innerHTML = `
    <option value="">Selecionar Cliente</option>
    `;

    clientes.forEach(c=>{

        select.innerHTML += `
        <option value="${c.nome}">
        ${c.nome}
        </option>
        `;
    });
}

function addServico(){

    const cliente =
    document.getElementById('clienteSelect').value ||
    document.getElementById('novoCliente').value;

    const telefone =
    document.getElementById('telefoneCliente').value;

    const servico =
    document.getElementById('servico').value;

    const valor =
    document.getElementById('valor').value;

    const entrega =
    document.getElementById('entrega').value;

    const observacao =
    document.getElementById('observacao').value;

    const status =
    document.getElementById('status').value;

    if(!cliente || !servico){
        alert('Preencha os campos');
        return;
    }

    const existe = clientes.find(c=>c.nome===cliente);

    if(!existe){

        clientes.push({
            nome:cliente,
            telefone
        });
    }

    servicos.push({

        id:Date.now(),
        cliente,
        telefone,
        servico,
        valor,
        entrega,
        observacao,
        status

    });

    autoSync();

    renderClientes();
    renderServicos();

    document.getElementById('novoCliente').value='';
    document.getElementById('telefoneCliente').value='';
    document.getElementById('servico').value='';
    document.getElementById('valor').value='';
    document.getElementById('entrega').value='';
    document.getElementById('observacao').value='';
}

function renderServicos(){

    const lista =
    document.getElementById('listaServicos');

    const pesquisa =
    document.getElementById('pesquisa').value.toLowerCase();

    const filtro =
    document.getElementById('filtroStatus').value;

    lista.innerHTML='';

    servicos
    .sort((a,b)=>{

        if(a.status==='Pronto' && b.status!=='Pronto') return 1;
        if(a.status!=='Pronto' && b.status==='Pronto') return -1;

        return b.id - a.id;
    })

    .filter(s=>{

        return (
            s.cliente.toLowerCase().includes(pesquisa) ||
            s.servico.toLowerCase().includes(pesquisa)
        )

    })

    .filter(s=>{

        if(!filtro) return true;

        return s.status===filtro;
    })

    .forEach(s=>{

        let classe='pendente';

        if(s.status==='Em andamento'){
            classe='andamento';
        }

        if(s.status==='Pronto'){
            classe='pronto';
        }

        lista.innerHTML += `

        <div class="service">

        <h2>${s.cliente}</h2>

        <p><b>Serviço:</b> ${s.servico}</p>

        <p><b>Valor:</b> R$ ${s.valor}</p>

        <p><b>Entrega:</b> ${s.entrega}</p>

        <p><b>Observação:</b> ${s.observacao || '-'}</p>

        <span class="status ${classe}">
        ${s.status}
        </span>

        <div class="actions">

        <button class="edit"
        onclick="editarServico(${s.id})">
        Editar
        </button>

        <button class="done"
        onclick="alterarStatus(${s.id})">
        Status
        </button>

        <button class="delete"
        onclick="removerServico(${s.id})">
        Excluir
        </button>

        </div>

        </div>
        `;
    });

    atualizarDashboard();
}

function editarServico(id){

    const s = servicos.find(x=>x.id===id);

    const novo =
    prompt('Editar serviço',s.servico);

    if(novo){

        s.servico = novo;

        autoSync();

        renderServicos();
    }
}

function alterarStatus(id){

    const s = servicos.find(x=>x.id===id);

    const novo = prompt(
`1=Pendente
2=Andamento
3=Pronto`
    );

    if(novo==1) s.status='Pendente';
    if(novo==2) s.status='Em andamento';
    if(novo==3) s.status='Pronto';

    autoSync();

    renderServicos();
}

function removerServico(id){

    if(confirm('Excluir serviço?')){

        servicos =
        servicos.filter(s=>s.id!==id);

        autoSync();

        renderServicos();
    }
}

function addTarefa(){

    const tarefa =
    document.getElementById('tarefa').value;

    const hora =
    document.getElementById('hora').value;

    const data =
    document.getElementById('dataTarefa').value;

    tarefas.push({

        id:Date.now(),
        tarefa,
        hora,
        data,
        feito:false

    });

    autoSync();

    renderTarefas();

    document.getElementById('tarefa').value='';
    document.getElementById('hora').value='';
    document.getElementById('dataTarefa').value='';
}

function renderTarefas(){

    const lista =
    document.getElementById('listaTarefas');

    lista.innerHTML='';

    tarefas.forEach(t=>{

        lista.innerHTML += `

        <div class="service">

        <h2>${t.tarefa}</h2>

        <p>${t.hora}</p>

        <p>${t.data}</p>

        <p>${t.feito ? '✅ Feito' : '❌ Pendente'}</p>

        <div class="actions">

        <button class="done"
        onclick="toggleTarefa(${t.id})">
        Marcar
        </button>

        <button class="delete"
        onclick="removerTarefa(${t.id})">
        Excluir
        </button>

        </div>

        </div>
        `;
    });

    atualizarDashboard();
}

function toggleTarefa(id){

    const t = tarefas.find(x=>x.id===id);

    t.feito = !t.feito;

    autoSync();

    renderTarefas();
}

function removerTarefa(id){

    tarefas =
    tarefas.filter(t=>t.id!==id);

    autoSync();

    renderTarefas();
}

function atualizarDashboard(){

    saveLocal();

    document.getElementById('totalServicos').innerText =
    servicos.length;

    const concluidos =
    servicos.filter(s=>s.status==='Pronto');

    document.getElementById('totalConcluidos').innerText =
    concluidos.length;

    let valorConcluido = 0;
    let valorPendente = 0;

    servicos.forEach(s=>{

        if(s.status==='Pronto'){
            valorConcluido += Number(s.valor || 0);
        }else{
            valorPendente += Number(s.valor || 0);
        }
    });

    document.getElementById('valorConcluido').innerText =
    'R$ '+valorConcluido.toFixed(2);

    document.getElementById('valorPendente').innerText =
    'R$ '+valorPendente.toFixed(2);

    document.getElementById('totalCompromissos').innerText =
    tarefas.length;

    const feitos =
    tarefas.filter(t=>t.feito).length;

    document.getElementById('totalFeitos').innerText =
    feitos;

    document.getElementById('totalPendentes').innerText =
    tarefas.length - feitos;

    atualizarGrafico();
}

let chart;

function atualizarGrafico(){

    const pendentes =
    servicos.filter(s=>s.status==='Pendente').length;

    const andamento =
    servicos.filter(s=>s.status==='Em andamento').length;

    const prontos =
    servicos.filter(s=>s.status==='Pronto').length;

    const ctx =
    document.getElementById('grafico');

    if(chart){
        chart.destroy();
    }

    chart = new Chart(ctx,{

        type:'doughnut',

        data:{

            labels:[
                'Pendentes',
                'Andamento',
                'Prontos'
            ],

            datasets:[{

                data:[
                    pendentes,
                    andamento,
                    prontos
                ]

            }]
        }
    });
}

function backupData(){

    const dados = {
        servicos,
        tarefas,
        clientes
    };

    const blob =
    new Blob(
        [JSON.stringify(dados)],
        {type:'application/json'}
    );

    const a =
    document.createElement('a');

    a.href =
    URL.createObjectURL(blob);

    a.download =
    'backup-organizador.json';

    a.click();
}

renderClientes();
renderServicos();
renderTarefas();
atualizarDashboard();

</script>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
doc,
setDoc,
onSnapshot

}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyBzpZz666Vsuuxx_FvBTIITCxyHJwRx4K0",
authDomain:"organizador-web-58a32.firebaseapp.com",
projectId:"organizador-web-58a32",
storageBucket:"organizador-web-58a32.firebasestorage.app",
messagingSenderId:"868666016791",
appId:"1:868666016791:web:ad99b7ca5f55fac9dd4852"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

window.autoSync =
async function(){

    localStorage.setItem(
        'servicos',
        JSON.stringify(servicos)
    );

    localStorage.setItem(
        'tarefas',
        JSON.stringify(tarefas)
    );

    localStorage.setItem(
        'clientes',
        JSON.stringify(clientes)
    );

    await setDoc(

        doc(db,"backup","dados"),

        {

            servicos,
            tarefas,
            clientes,
            atualizado:Date.now()

        }

    );
}

window.salvarNuvem =
async function(){

    await autoSync();

    alert('Backup salvo!');
}

window.restaurarNuvem =
function(){

    alert(
    'Restauração automática ativada.'
    );
}

onSnapshot(

    doc(db,"backup","dados"),

    (docSnap)=>{

        if(docSnap.exists()){

            const dados =
            docSnap.data();

            servicos =
            dados.servicos || [];

            tarefas =
            dados.tarefas || [];

            clientes =
            dados.clientes || [];

            renderClientes();
            renderServicos();
            renderTarefas();
            atualizarDashboard();
        }
    }
);

</script>

</body>
</html>
