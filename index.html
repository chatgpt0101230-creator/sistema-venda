<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Organizador Premium</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<div class="logo">
<i class="fa-solid fa-layer-group"></i>
Organizador Premium
</div>

<div class="top-buttons">

<button onclick="toggleMenu()">
☰
</button>

<button onclick="toggleDarkMode()">
🌙
</button>

</div>

</header>

<div class="container">

<div class="sidebar hide">

<button onclick="showTab('dashboard')">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</button>

<button onclick="showTab('cadastro')">
<i class="fa-solid fa-plus"></i>
Cadastro
</button>

<button onclick="showTab('historico')">
<i class="fa-solid fa-clock-rotate-left"></i>
Histórico
</button>

<button onclick="showTab('organizacao')">
<i class="fa-solid fa-calendar"></i>
Organização
</button>

<hr style="margin:20px 0;opacity:0.2;">

<button onclick="backupData()">
💾 Backup
</button>

<button onclick="salvarNuvem()">
☁ Nuvem
</button>

<button onclick="restaurarNuvem()">
📥 Restaurar
</button>

<input type="file" id="restoreFile" hidden>

<button onclick="document.getElementById('restoreFile').click()">
♻ Restaurar Backup
</button>

</div>

<div class="content">
<!-- DASHBOARD -->

<div class="tab active" id="dashboard">

<div class="card">

<h3>📅 Filtro de Período</h3>

<select id="filtroPeriodo" onchange="updateDashboard(); renderGrafico();">

<option value="todos">Todos os períodos</option>
<option value="hoje">Hoje</option>
<option value="semana">Esta Semana</option>
<option value="mes">Este Mês</option>
<option value="ano">Este Ano</option>

</select>

</div>

<div class="dashboard">

<div class="box">
<i class="fa-solid fa-box fa-2x"></i>
<h2 id="totalServicos">0</h2>
<p>Total Serviços</p>
</div>

<div class="box">
<i class="fa-solid fa-money-bill fa-2x"></i>
<h2 id="valorPendente">R$ 0</h2>
<p>Valores Pendentes</p>
</div>

<div class="box">
<i class="fa-solid fa-circle-check fa-2x"></i>
<h2 id="valorPronto">R$ 0</h2>
<p>Valores Concluídos</p>
</div>

<div class="box">
<i class="fa-solid fa-list-check fa-2x"></i>
<h2 id="totalCompromissos">0</h2>
<p>Compromissos</p>
</div>

</div>

<div class="chart-container">
<canvas id="grafico"></canvas>
</div>

</div>

<!-- CADASTRO -->

<div class="tab" id="cadastro">

<div class="card">

<h2>Cadastrar Serviço</h2>

<select id="clienteSelect">
<option value="">Selecionar Cliente</option>
</select>

<input
type="text"
id="novoCliente"
placeholder="Novo Cliente">

<input
type="text"
id="telefoneCliente"
placeholder="Telefone">

<input
type="text"
id="servico"
placeholder="Serviço">

<input
type="number"
id="valor"
placeholder="Valor">

<input
type="date"
id="entrega">

<textarea
id="observacao"
placeholder="Observação"></textarea>

<select id="status">

<option>Pendente</option>
<option>Em andamento</option>
<option>Pronto</option>

</select>

<button
class="btn"
onclick="addServico()">

Cadastrar Serviço

</button>

</div>

</div>
<!-- HISTÓRICO -->

<div class="tab" id="historico">

<div class="search-box">

<input
type="text"
id="pesquisa"
placeholder="Pesquisar serviço ou cliente..."
onkeyup="renderServicos()">

</div>

<div id="listaServicos"></div>

</div>

<!-- ORGANIZAÇÃO -->

<div class="tab" id="organizacao">

<div class="card">

<h2>Adicionar Compromisso</h2>

<input
type="text"
id="tarefa"
placeholder="Compromisso">

<input
type="time"
id="hora">

<input
type="date"
id="dataTarefa">

<button
class="btn"
onclick="addTarefa()">

Adicionar

</button>

</div>

<div id="listaTarefas"></div>

</div>

<!-- FECHAMENTO DO CONTEÚDO -->

</div>

</div>
<!-- IMPORTAÇÃO DOS ARQUIVOS -->

<script src="app.js"></script>

<script type="module" src="firebase.js"></script>

</body>

</html>
